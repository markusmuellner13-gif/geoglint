<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <radialGradient id="glow" cx="40%" cy="35%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.3)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
  </defs>
  <!-- Background pill -->
  <rect width="64" height="64" rx="14" fill="#020617"/>
  <!-- Globe body -->
  <circle cx="32" cy="32" r="22" fill="url(#bg)"/>
  <!-- Latitude lines -->
  <ellipse cx="32" cy="32" rx="22" ry="9" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1.2"/>
  <ellipse cx="32" cy="21" rx="14" ry="5" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <ellipse cx="32" cy="43" rx="14" ry="5" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <!-- Vertical center line -->
  <line x1="32" y1="10" x2="32" y2="54" stroke="rgba(255,255,255,0.2)" stroke-width="1.2"/>
  <!-- Highlight -->
  <circle cx="32" cy="32" r="22" fill="url(#glow)"/>
  <!-- Clip to circle -->
  <circle cx="32" cy="32" r="22" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
</svg>
